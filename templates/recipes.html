{% extends "base.html" %}
{% block title %}All Recipes{% endblock %}
{% block content %}
  <h2>All Recipes</h2>

  <div class="recipe-list">
    {% for r in recipes %}
      <div class="recipe-card">
        {% if r.image_url %}
          <img src="{{ r.image_url }}" alt="{{ r.name }}" class="recipe-thumb">
        {% endif %}
        <h3><a href="{{ url_for('recipe_detail', recipe_id=r.id) }}">{{ r.name }}</a></h3>

        {% if r.tags %}
          <div class="recipe-tags">
            {% for t in r.tags.split(',') %}
              <span>{{ t }}</span>
            {% endfor %}
          </div>
        {% endif %}
      </div>
    {% endfor %}
  </div>
{% endblock %}
